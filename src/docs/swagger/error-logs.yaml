paths:
  /api/v1/error-logs:
    post:
      summary: Registrar error de frontend o backend
      description: Endpoint público (sin autenticación requerida) para que el frontend
        pueda reportar errores. Captura automáticamente IP, user-agent y userId
        si hay JWT presente.
      tags:
        - Error Logs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
                - errorCode
                - errorMessage
              properties:
                source:
                  type: string
                  enum:
                    - frontend
                    - backend
                  description: Origen del error
                  example: frontend
                level:
                  type: string
                  enum:
                    - error
                    - warning
                    - critical
                  description: Nivel de severidad
                  default: error
                  example: error
                errorCode:
                  type: string
                  description: Código del error
                  example: COMPONENT_RENDER_ERROR
                errorMessage:
                  type: string
                  description: Mensaje descriptivo del error
                  example: Failed to render ProductList component
                stackTrace:
                  type: string
                  description: Stack trace del error
                  example: |-
                    Error: Cannot read property 'map' of undefined
                        at ProductList.render...
                endpoint:
                  type: string
                  description: Endpoint o ruta donde ocurrió el error
                  example: /dashboard/products
                method:
                  type: string
                  description: Método HTTP (para errores de API)
                  example: GET
                statusCode:
                  type: integer
                  description: Código de estado HTTP
                  example: 500
                sessionId:
                  type: string
                  description: ID de sesión para rastrear múltiples errores
                  example: sess_abc123xyz
                context:
                  type: object
                  description: Contexto adicional del error
                  example:
                    url: /dashboard/products
                    component: ProductList
                    action: initial_render
                    userAction: page_load
                metadata:
                  type: object
                  description: Metadata adicional
                  example:
                    browser: Chrome 118
                    os: Windows 11
                    screenSize: 1920x1080
                    viewport: 1600x900
            examples:
              frontend_error:
                summary: Error de frontend
                value:
                  source: frontend
                  level: error
                  errorCode: COMPONENT_RENDER_ERROR
                  errorMessage: Failed to render ProductList component
                  stackTrace: "Error: Cannot read property 'map' of undefined..."
                  context:
                    url: /dashboard/products
                    component: ProductList
                    action: initial_render
                  metadata:
                    browser: Chrome 118
                    os: Windows 11
              api_error:
                summary: Error de API desde frontend
                value:
                  source: frontend
                  level: warning
                  errorCode: API_REQUEST_FAILED
                  errorMessage: Failed to fetch organizations
                  endpoint: /api/v1/organizations
                  method: GET
                  statusCode: 500
                  context:
                    retryCount: 3
                    timeout: 5000
      responses:
        "201":
          description: Error registrado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 01919eb8-5e8a-7890-b456-123456789abc
                      source:
                        type: string
                        example: frontend
                      level:
                        type: string
                        example: error
                      errorCode:
                        type: string
                        example: COMPONENT_RENDER_ERROR
                      createdAt:
                        type: string
                        example: 2025-10-13T18:00:00Z
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: Invalid data
                      details:
                        type: array
                        example:
                          - path:
                              - source
                            message: Source must be either 'frontend' or 'backend'
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error logging error
