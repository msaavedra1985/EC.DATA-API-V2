paths:
  /api/v1/devices:
    post:
      summary: Crear un nuevo device (dispositivo IoT/Edge)
      description: Crea un device perteneciente a una organización y opcionalmente a
        un site. Solo system-admin y org-admin pueden crear devices.
      tags:
        - Devices
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organizationId
                - name
                - device_type
              properties:
                organizationId:
                  type: string
                  description: Public code de la organización (ej ORG-abc123-1)
                  example: ORG-yOM9ewfqOeWa-4
                siteId:
                  type: string
                  description: Public code del site (opcional)
                  example: SITE-abc123xyz-1
                name:
                  type: string
                  description: Nombre del device
                  example: Sensor Temperatura Sala 1
                description:
                  type: string
                  description: Descripción del device
                  example: Sensor de temperatura y humedad en sala principal
                device_type:
                  type: string
                  enum:
                    - sensor
                    - gateway
                    - controller
                    - edge
                    - virtual
                    - other
                  description: Tipo de dispositivo
                  example: sensor
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                    - maintenance
                    - decommissioned
                  description: Estado del dispositivo
                  default: active
                  example: active
                firmwareVersion:
                  type: string
                  description: Versión del firmware
                  example: v2.5.1
                serialNumber:
                  type: string
                  description: Número de serie del dispositivo
                  example: SN-2024-001234
                ipAddress:
                  type: string
                  description: Dirección IP del dispositivo
                  example: 192.168.1.100
                macAddress:
                  type: string
                  description: Dirección MAC del dispositivo
                  example: 00:1A:2B:3C:4D:5E
                location_hint:
                  type: string
                  description: Pista de ubicación física
                  example: Rack 3, Slot 5
                metadata:
                  type: object
                  description: Metadatos adicionales en formato JSON
                  example:
                    manufacturer: Acme Corp
                    model: TH-100
                isActive:
                  type: boolean
                  description: Si el device está activo
                  default: true
      responses:
        "201":
          description: Device creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: DEV-abc123xyz-1
                      name:
                        type: string
                        example: Sensor Temperatura Sala 1
                      device_type:
                        type: string
                        example: sensor
                      status:
                        type: string
                        example: active
                      organization:
                        type: object
                        properties:
                          id:
                            type: string
                            example: ORG-yOM9ewfqOeWa-4
                          name:
                            type: string
                            example: EC.DATA
                      site:
                        type: object
                        nullable: true
                        properties:
                          id:
                            type: string
                            example: SITE-abc123xyz-1
                          name:
                            type: string
                            example: Sucursal Centro
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "403":
          description: Sin permisos
        "404":
          description: Organización o site no encontrado
    get:
      summary: Listar devices con paginación y filtros
      description: Obtiene lista de devices con filtros opcionales
      tags:
        - Devices
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: organizationId
          description: Filtrar por organización (public_code)
          schema:
            type: string
            example: ORG-yOM9ewfqOeWa-4
        - in: query
          name: siteId
          description: Filtrar por site (public_code)
          schema:
            type: string
            example: SITE-abc123xyz-1
        - in: query
          name: device_type
          description: Filtrar por tipo de dispositivo
          schema:
            type: string
            enum:
              - sensor
              - gateway
              - controller
              - edge
              - virtual
              - other
            example: sensor
        - in: query
          name: status
          description: Filtrar por estado del dispositivo
          schema:
            type: string
            enum:
              - active
              - inactive
              - maintenance
              - decommissioned
            example: active
        - in: query
          name: search
          description: Buscar por nombre o serialNumber
          schema:
            type: string
            example: Sensor
        - in: query
          name: limit
          description: Número máximo de resultados
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          description: Número de registros a saltar
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Lista de devices obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    description: Array de devices
                    items:
                      $ref: "#/components/schemas/Device"
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 33
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      timestamp:
                        type: string
                        format: date-time
                      organizationFilter:
                        type: object
        "401":
          description: No autenticado
  "/api/v1/devices/{id}":
    get:
      summary: Obtener un device por ID
      description: Obtiene los detalles de un device específico por su public_code
      tags:
        - Devices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Public code del device (ej DEV-abc123-1)
          schema:
            type: string
            example: DEV-abc123xyz-1
      responses:
        "200":
          description: Device obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
        "401":
          description: No autenticado
        "404":
          description: Device no encontrado
    put:
      summary: Actualizar un device
      description: Actualiza los datos de un device existente. Solo system-admin y
        org-admin pueden actualizar.
      tags:
        - Devices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Public code del device
          schema:
            type: string
            example: DEV-abc123xyz-1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                siteId:
                  type: string
                  example: SITE-abc123xyz-1
                name:
                  type: string
                  example: Sensor Temperatura Sala 1 - Actualizado
                description:
                  type: string
                device_type:
                  type: string
                  enum:
                    - sensor
                    - gateway
                    - controller
                    - edge
                    - virtual
                    - other
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                    - maintenance
                    - decommissioned
                firmwareVersion:
                  type: string
                serialNumber:
                  type: string
                ipAddress:
                  type: string
                macAddress:
                  type: string
                location_hint:
                  type: string
                metadata:
                  type: object
                isActive:
                  type: boolean
      responses:
        "200":
          description: Device actualizado exitosamente
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "403":
          description: Sin permisos
        "404":
          description: Device no encontrado
    delete:
      summary: Eliminar un device (soft delete)
      description: Elimina lógicamente un device y marca sus channels como inactivos.
        Solo system-admin puede eliminar.
      tags:
        - Devices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Public code del device
          schema:
            type: string
            example: DEV-abc123xyz-1
      responses:
        "200":
          description: Device eliminado exitosamente con cascade a channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      device:
                        type: object
                        description: Device serializado (sin deletedAt)
                      cascade:
                        type: object
                        properties:
                          channelsAffected:
                            type: integer
                            example: 5
                          channelUpdates:
                            type: array
                            items:
                              type: object
                      deletionStatus:
                        type: object
                        properties:
                          deleted:
                            type: boolean
                            example: true
                          deletedAt:
                            type: string
                            format: date-time
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      locale:
                        type: string
                      action:
                        type: string
                        example: delete
        "401":
          description: No autenticado
        "403":
          description: Sin permisos
        "404":
          description: Device no encontrado
