paths:
  /api/v1/organizations:
    get:
      summary: Listar organizaciones con paginación y filtros
      description: Obtiene lista de organizaciones con scope basado en permisos.
        System-admin ve todas, otros roles ven según jerarquía.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          description: Número máximo de resultados
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          description: Número de registros a saltar (paginación)
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: search
          description: Buscar por nombre o slug
          schema:
            type: string
            example: acme
        - in: query
          name: parent_id
          description: Filtrar por organización padre (public_code)
          schema:
            type: string
            example: ORG-1A2B3C
        - in: query
          name: active_only
          description: Solo mostrar organizaciones activas
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Lista de organizaciones obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
                    example:
                      - id: ORG-1A2B3C
                        human_id: 1
                        name: EC.DATA
                        slug: ecdata
                        description: Root organization
                        parent_id: null
                        is_active: true
                        logo_url: null
                        website: https://ec.data
                        created_at: 2025-10-01T10:00:00Z
                        updated_at: 2025-10-01T10:00:00Z
                      - id: ORG-4D5E6F
                        human_id: 2
                        name: ACME Corporation
                        slug: acme-corp
                        description: Client organization
                        parent_id: ORG-1A2B3C
                        is_active: true
                        logo_url: https://storage.azure.com/logos/acme.png
                        website: https://acme.com
                        created_at: 2025-10-05T14:30:00Z
                        updated_at: 2025-10-05T14:30:00Z
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 42
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      timestamp:
                        type: string
                        format: date-time
        "401":
          description: No autenticado - Token JWT faltante o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: Authentication required
        "403":
          description: Sin permisos - Usuario no tiene acceso a organizaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: FORBIDDEN
                      message:
                        type: string
                        example: Insufficient permissions
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error listing organizations
    post:
      summary: Crear nueva organización
      description: Crea una nueva organización. Requiere permisos de creación. Máximo
        5 niveles de profundidad en jerarquía.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Nombre de la organización
                  example: ACME Corporation
                slug:
                  type: string
                  description: Slug único (se genera automáticamente si no se proporciona)
                  example: acme-corporation
                parent_id:
                  type: string
                  description: Public code de la organización padre (opcional)
                  example: ORG-1A2B3C
                countries:
                  type: array
                  description: Países donde opera la organización (mínimo 1, exactamente 1
                    primary)
                  items:
                    type: object
                    required:
                      - code
                    properties:
                      code:
                        type: string
                        description: Código ISO 3166-1 alpha-2 del país
                        example: MX
                      is_primary:
                        type: boolean
                        description: Indica si es el país principal
                        example: true
                  example:
                    - code: MX
                      is_primary: true
                    - code: CO
                      is_primary: false
                tax_id:
                  type: string
                  description: RFC o Tax ID
                  example: ABC123456XYZ
                email:
                  type: string
                  format: email
                  example: contact@acme.com
                phone:
                  type: string
                  example: +52 55 1234 5678
                address:
                  type: string
                  example: Av. Reforma 123, CDMX
                logo_url:
                  type: string
                  format: uri
                  example: https://storage.azure.com/logos/acme.png
                settings:
                  type: object
                  description: Configuraciones personalizadas JSON
      responses:
        "201":
          description: Organización creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    example:
                      id: ORG-7G8H9J
                      human_id: 15
                      name: ACME Corporation
                      slug: acme-corporation
                      description: null
                      parent_id: ORG-1A2B3C
                      is_active: true
                      logo_url: https://storage.azure.com/logos/acme.png
                      website: null
                      created_at: 2025-10-13T17:15:00Z
                      updated_at: 2025-10-13T17:15:00Z
        "400":
          description: Error de validación - Datos inválidos en el request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: Invalid data
                      details:
                        type: array
                        description: Array de errores de validación de Zod
                        example:
                          - path:
                              - name
                            message: Required
                          - path:
                              - countries
                            message: At least one country is required
        "401":
          description: No autenticado - Token JWT faltante o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: Authentication required
        "403":
          description: Sin permisos para crear organizaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: FORBIDDEN
                      message:
                        type: string
                        example: Insufficient permissions to create organization
        "404":
          description: Organización padre no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: PARENT_NOT_FOUND
                      message:
                        type: string
                        example: Parent organization not found
        "409":
          description: El slug ya existe
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: SLUG_EXISTS
                      message:
                        type: string
                        example: Slug already exists
                      details:
                        type: object
                        properties:
                          slug:
                            type: string
                            example: acme-corporation
        "422":
          description: Profundidad máxima excedida (5 niveles)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: MAX_DEPTH_EXCEEDED
                      message:
                        type: string
                        example: Maximum organization depth (5 levels) exceeded
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error creating organization
  /api/v1/organizations/hierarchy:
    get:
      summary: Obtener árbol jerárquico completo
      description: Obtiene estructura de árbol de organizaciones desde la raíz.
        Incluye todas las organizaciones hijas recursivamente. Usa caché de
        Redis.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: root_id
          description: Public code de la organización raíz (opcional, por defecto EC.DATA)
          schema:
            type: string
            example: ORG-1A2B3C
        - in: query
          name: active_only
          description: Solo incluir organizaciones activas
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Árbol jerárquico obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Nodo raíz con children recursivos
                    properties:
                      id:
                        type: string
                      public_code:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      children:
                        type: array
                        items:
                          type: object
                          description: Mismo esquema recursivamente
                    example:
                      id: ORG-1A2B3C
                      human_id: 1
                      name: EC.DATA
                      slug: ecdata
                      parent_id: null
                      is_active: true
                      children:
                        - id: ORG-4D5E6F
                          human_id: 2
                          name: ACME Corporation
                          slug: acme-corp
                          parent_id: ORG-1A2B3C
                          is_active: true
                          children:
                            - id: ORG-7G8H9J
                              human_id: 5
                              name: ACME North Division
                              slug: acme-north
                              parent_id: ORG-4D5E6F
                              is_active: true
                              children: []
                            - id: ORG-2K3L4M
                              human_id: 6
                              name: ACME South Division
                              slug: acme-south
                              parent_id: ORG-4D5E6F
                              is_active: true
                              children: []
                        - id: ORG-5N6P7Q
                          human_id: 3
                          name: TechStart Inc
                          slug: techstart
                          parent_id: ORG-1A2B3C
                          is_active: true
                          children: []
        "401":
          description: No autenticado - Token JWT faltante o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: Authentication required
        "404":
          description: Organización raíz no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: ROOT_NOT_FOUND
                      message:
                        type: string
                        example: Root organization not found
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error getting hierarchy
  /api/v1/organizations/validate-slug:
    get:
      summary: Validar disponibilidad de slug
      description: Verifica si un slug está disponible para uso. Útil para validación
        en tiempo real en formularios.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: slug
          required: true
          description: Slug a validar
          schema:
            type: string
            example: acme-corp
      responses:
        "200":
          description: Validación exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      slug:
                        type: string
                        example: acme-corp
                      available:
                        type: boolean
                        example: true
        "400":
          description: Slug faltante o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: MISSING_SLUG
                      message:
                        type: string
                        example: Slug parameter is required
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: Authentication required
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error validating slug
  "/api/v1/organizations/{id}":
    get:
      summary: Obtener detalles de una organización
      description: Obtiene información completa de una organización específica.
        Requiere permiso de vista sobre la organización.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Public code de la organización (ej. ORG-1A2B3C)
          schema:
            type: string
            example: ORG-1A2B3C
      responses:
        "200":
          description: Detalles de la organización obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    example:
                      id: ORG-7K9D2-X
                      slug: ec-data
                      name: EC.DATA
                      description: Enterprise data solutions and backend infrastructure
                      logo_url: https://storage.azure.com/logos/ecdata.png
                      website: https://ec.data
                      countries:
                        - code: US
                          is_primary: true
                      primary_country: US
                      is_active: true
                      has_parent: false
                      created_at: 2025-10-01T10:00:00Z
                      updated_at: 2025-10-01T10:00:00Z
        "401":
          description: No autenticado - Token JWT faltante o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: Authentication required
        "403":
          description: Sin permisos para ver esta organización
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: FORBIDDEN
                      message:
                        type: string
                        example: Insufficient permissions to view organization
        "404":
          description: Organización no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: NOT_FOUND
                      message:
                        type: string
                        example: Organization not found
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error getting organization
    put:
      summary: Actualizar organización
      description: Actualiza información de una organización existente. Requiere
        permisos de edición. No permite cambios cíclicos en jerarquía.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Public code de la organización
          schema:
            type: string
            example: ORG-1A2B3C
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
                parent_id:
                  type: string
                  description: Public code del nuevo padre
                countries:
                  type: array
                  description: Países donde opera la organización
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        example: MX
                      is_primary:
                        type: boolean
                        example: true
                tax_id:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
                logo_url:
                  type: string
                settings:
                  type: object
      responses:
        "200":
          description: Organización actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    example:
                      id: ORG-4D5E6F
                      human_id: 2
                      name: ACME Corporation - Updated
                      slug: acme-corporation
                      description: Updated description
                      parent_id: ORG-1A2B3C
                      is_active: true
                      logo_url: https://storage.azure.com/logos/acme-new.png
                      website: https://acme.com
                      created_at: 2025-10-05T14:30:00Z
                      updated_at: 2025-10-13T17:20:00Z
        "400":
          description: Error de validación o referencia cíclica detectada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: Invalid data
                      details:
                        type: array
                        description: Array de errores de validación de Zod
                        example:
                          - path:
                              - slug
                            message: Invalid slug format
                          - path:
                              - parent_id
                            message: Invalid organization ID
        "401":
          description: No autenticado - Token JWT faltante o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: Authentication required
        "403":
          description: Sin permisos para editar esta organización
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: FORBIDDEN
                      message:
                        type: string
                        example: Insufficient permissions to edit organization
        "404":
          description: Organización no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: NOT_FOUND
                      message:
                        type: string
                        example: Organization not found
        "409":
          description: El slug ya existe
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: SLUG_EXISTS
                      message:
                        type: string
                        example: Slug already exists
                      details:
                        type: object
                        properties:
                          slug:
                            type: string
                            example: acme-corporation
        "422":
          description: Profundidad máxima excedida o ciclo detectado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: CYCLE_DETECTED
                      message:
                        type: string
                        example: Cannot create circular hierarchy
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_ERROR
                      message:
                        type: string
                        example: Error updating organization
    delete:
      summary: Eliminar organización (soft delete)
      description: Marca organización como eliminada. Valida que no tenga hijos
        activos. Los usuarios se mantienen y se les quita la membresía. Requiere
        permisos de eliminación.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Public code de la organización a eliminar
          schema:
            type: string
            example: ORG-4D5E6F
      responses:
        "200":
          description: Organización eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
                      organization_id:
                        type: string
                        example: ORG-4D5E6F
                      memberships_removed:
                        type: integer
                        example: 5
        "400":
          description: Organización tiene hijos activos
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: HAS_ACTIVE_CHILDREN
                      message:
                        type: string
                        example: Cannot delete organization with active children
                      details:
                        type: object
                        properties:
                          children_count:
                            type: integer
                            example: 3
        "401":
          description: No autenticado
        "403":
          description: Sin permisos para eliminar esta organización
        "404":
          description: Organización no encontrada
        "500":
          description: Error interno del servidor
  /api/v1/organizations/validate:
    post:
      summary: Validar disponibilidad de nombre y/o slug de organización
      description: Verifica si el nombre o slug ya están en uso. Útil para validación
        en tiempo real en formularios.
      tags:
        - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nombre de organización a validar
                  example: ACME Corporation
                slug:
                  type: string
                  description: Slug a validar
                  example: acme-corp
                exclude_id:
                  type: string
                  description: Public code de organización a excluir (para edición)
                  example: ORG-1A2B3C
              oneOf:
                - required:
                    - name
                - required:
                    - slug
      responses:
        "200":
          description: Validación exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
