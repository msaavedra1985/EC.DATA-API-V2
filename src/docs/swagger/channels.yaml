paths:
  /api/v1/channels:
    post:
      summary: Crear un nuevo channel (punto de medición)
      description: Crea un punto de medición perteneciente a un dispositivo. El
        organizationId se obtiene automáticamente del dispositivo.
      tags:
        - Channels
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deviceId
                - name
              properties:
                deviceId:
                  type: string
                  description: Public code del dispositivo
                  example: DEV-abc123xyz-1
                name:
                  type: string
                  description: Nombre del canal (único por dispositivo)
                  example: Edificio 1 - Lado Derecho
                description:
                  type: string
                  description: Descripción del canal
                ch:
                  type: integer
                  description: Número de canal físico
                  example: 1
                measurementTypeId:
                  type: integer
                  description: ID del tipo de medición
                  example: 1
                phaseSystem:
                  type: integer
                  description: "Sistema eléctrico: 0=N/A, 1=monofásico, 3=trifásico"
                  example: 3
                phase:
                  type: integer
                  description: Fase que lee (1, 2 o 3)
                  minimum: 1
                  maximum: 3
                  example: 1
                process:
                  type: boolean
                  description: Si se procesan los datos del canal
                  default: true
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                    - error
                    - disabled
                  default: active
                metadata:
                  type: object
                  description: Metadatos adicionales
                isActive:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Channel creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: CHN-abc123xyz-1
                      name:
                        type: string
                        example: Edificio 1 - Lado Derecho
                      ch:
                        type: integer
                        example: 1
                      measurementTypeId:
                        type: integer
                        example: 1
                      phaseSystem:
                        type: integer
                        example: 3
                      phase:
                        type: integer
                        example: 1
                      process:
                        type: boolean
                        example: true
                      status:
                        type: string
                        example: active
                      device:
                        type: object
                        properties:
                          id:
                            type: string
                            example: DEV-abc123xyz-1
                          name:
                            type: string
                      organization:
                        type: object
                        properties:
                          id:
                            type: string
                            example: ORG-yOM9ewfqOeWa-4
                          name:
                            type: string
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "403":
          description: Sin permisos
        "404":
          description: Device no encontrado
    get:
      summary: Listar channels con paginación y filtros
      description: Obtiene una lista paginada de channels con filtros opcionales.
      tags:
        - Channels
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: deviceId
          schema:
            type: string
          description: Filtrar por publicCode del dispositivo
        - in: query
          name: organizationId
          schema:
            type: string
          description: Filtrar por publicCode de la organización
        - in: query
          name: measurementTypeId
          schema:
            type: integer
          description: Filtrar por tipo de medición
        - in: query
          name: status
          schema:
            type: string
            enum:
              - active
              - inactive
              - error
              - disabled
          description: Filtrar por estado
        - in: query
          name: search
          schema:
            type: string
          description: Buscar en nombre o descripción
        - in: query
          name: notInHierarchy
          schema:
            type: string
            enum:
              - "true"
              - "false"
          description: Si es "true", muestra solo channels que NO están en ninguna
            jerarquía de recursos
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Lista de channels obtenida exitosamente
        "400":
          description: Parámetros inválidos
  "/api/v1/channels/{id}":
    get:
      summary: Obtener un channel por ID público
      description: Obtiene los detalles de un channel específico usando su publicCode.
      tags:
        - Channels
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del channel
          example: CHN-abc123xyz-1
      responses:
        "200":
          description: Channel obtenido exitosamente
        "404":
          description: Channel no encontrado
    put:
      summary: Actualizar un channel
      description: Actualiza los datos de un channel existente.
      tags:
        - Channels
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                ch:
                  type: integer
                measurementTypeId:
                  type: integer
                phaseSystem:
                  type: integer
                  description: 0=N/A, 1=monofásico, 3=trifásico
                phase:
                  type: integer
                  minimum: 1
                  maximum: 3
                process:
                  type: boolean
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                    - error
                    - disabled
                metadata:
                  type: object
                isActive:
                  type: boolean
      responses:
        "200":
          description: Channel actualizado exitosamente
        "400":
          description: Error de validación
        "404":
          description: Channel no encontrado
    delete:
      summary: Eliminar un channel (soft delete)
      description: Realiza un soft delete de un channel. Solo system-admin puede
        eliminar channels.
      tags:
        - Channels
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del channel
      responses:
        "200":
          description: Channel eliminado exitosamente
        "404":
          description: Channel no encontrado
