paths:
  /api/v1/asset-categories:
    get:
      summary: Obtener todas las categorías visibles
      description: Retorna categorías de la organización y personales del usuario.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum:
              - organization
              - user
              - all
            default: all
          description: Filtrar por alcance (organization, user, o all)
        - in: query
          name: parentId
          schema:
            type: integer
          description: Filtrar por ID del padre (para obtener hijos directos)
        - in: query
          name: rootsOnly
          schema:
            type: boolean
            default: false
          description: Obtener solo categorías raíz (sin padre)
      responses:
        "200":
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssetCategory"
  /api/v1/asset-categories/organization:
    post:
      summary: Crear categoría de organización
      description: Crea una nueva categoría compartida para toda la organización.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Aire Acondicionado
                color:
                  type: string
                  pattern: ^#[0-9A-Fa-f]{6}$
                  example: "#3B82F6"
                parentId:
                  type: integer
                  nullable: true
                  description: ID de la categoría padre (null para raíz)
      responses:
        "201":
          description: Categoría creada exitosamente
  /api/v1/asset-categories/user:
    post:
      summary: Crear categoría personal
      description: Crea una nueva categoría personal para el usuario actual.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Mis Favoritos
                color:
                  type: string
                  pattern: ^#[0-9A-Fa-f]{6}$
                  example: "#10B981"
                parentId:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: Categoría personal creada exitosamente
  "/api/v1/asset-categories/{id}":
    get:
      summary: Obtener categoría por ID
      description: Retorna una categoría específica si el usuario tiene acceso.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID de la categoría
      responses:
        "200":
          description: Categoría encontrada
        "404":
          description: Categoría no encontrada o sin acceso
    put:
      summary: Actualizar categoría
      description: Actualiza nombre, color o padre de una categoría.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 100
                color:
                  type: string
                  pattern: ^#[0-9A-Fa-f]{6}$
                parentId:
                  type: integer
                  nullable: true
      responses:
        "200":
          description: Categoría actualizada
        "404":
          description: Categoría no encontrada
    delete:
      summary: Desactivar categoría (soft delete)
      description: Desactiva la categoría y todos sus descendientes.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categoría desactivada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  deactivated:
                    type: integer
                    description: Número de categorías desactivadas (incluye descendientes)
  "/api/v1/asset-categories/{id}/tree":
    get:
      summary: Obtener árbol jerárquico de una categoría
      description: Retorna ancestros, categoría actual, descendientes y breadcrumb.
      tags:
        - AssetCategories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Árbol de la categoría
          content:
            application/json:
              schema:
                type: object
                properties:
                  ancestors:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssetCategory"
                  current:
                    $ref: "#/components/schemas/AssetCategory"
                  descendants:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssetCategory"
                  breadcrumb:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
components:
  schemas:
    AssetCategory:
      type: object
      properties:
        id:
          type: integer
          description: ID de la categoría
        name:
          type: string
          description: Nombre de la categoría
        color:
          type: string
          description: Color hexadecimal para UI
        level:
          type: integer
          description: Nivel de profundidad (1=raíz)
        path:
          type: string
          description: Ruta materializada (ej /1/5/12/)
        parentId:
          type: integer
          nullable: true
          description: ID del padre (null si es raíz)
        scope:
          type: string
          enum:
            - organization
            - user
          description: Alcance de la categoría
        isActive:
          type: boolean
        parent:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            color:
              type: string
            level:
              type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
