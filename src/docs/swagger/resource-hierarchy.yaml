paths:
  /api/v1/resource-hierarchy/nodes:
    post:
      summary: Crear un nuevo nodo en la jerarquía
      description: >
        Crea un nodo (folder, site o channel) en la jerarquía de recursos de una organización.

        Los nodos permiten organizar recursos en estructura de árbol con profundidad ilimitada.


        **Reglas de tipo de nodo:**

        - `folder` — Nodo contenedor de organización. No requiere `referenceId`. Puede estar en cualquier nivel.

        - `site` — Representa un site físico o lógico. El `referenceId` es el public code del site (ej: `SIT-xxx`). Detecta duplicados: si el site ya está en la jerarquía de la organización, retorna 409. El nombre y el ícono se auto-enriquecen desde el site referenciado si no se envían.

        - `channel` — Representa un canal de datos. El `referenceId` es el public code del channel (ej: `CHN-xxx`). Detecta duplicados igual que `site`. El nombre y el ícono se auto-enriquecen desde el channel referenciado si no se envían.


        **Campos permitidos por tipo:**

        | Campo | folder | site | channel |
        |---|---|---|---|
        | `name` | ✓ | ✓ (auto si no se envía) | ✓ (auto si no se envía) |
        | `description` | ✓ | ✓ | ✓ |
        | `referenceId` | — | ✓ | ✓ |
        | `icon` | ✓ | ✓ (auto) | ✓ (auto) |
        | `displayOrder` | ✓ | ✓ | ✓ |
        | `metadata` | ✓ | ✓ | ✓ |
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nodeType
              discriminator:
                propertyName: nodeType
              description: >
                El body usa discriminated union por `nodeType`:

                - `folder`: `name` es **requerido**, `referenceId` no aplica.

                - `site`: `referenceId` es **requerido**, `name` es **opcional** (se auto-enriquece desde el site referenciado).

                - `channel`: `referenceId` es **requerido**, `name` es **opcional** (se auto-enriquece desde el channel referenciado).
              properties:
                organizationId:
                  type: string
                  description: Public code de la organización (opcional, usa la org activa del usuario si no se especifica)
                  example: ORG-abc123xyz-1
                parentId:
                  type: string
                  nullable: true
                  description: Public code del nodo padre (null para crear nodo raíz)
                  example: RES-def456ghi-2
                nodeType:
                  type: string
                  enum:
                    - folder
                    - site
                    - channel
                  description: Tipo de nodo (discriminante del schema de validación)
                  example: folder
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: >
                    Nombre del nodo.
                    **Requerido para `folder`**. Opcional para `site`/`channel` (se auto-enriquece desde el recurso referenciado si no se envía).
                  example: Sensores de Temperatura
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                  description: Descripción del nodo
                  example: Carpeta para agrupar sensores de temperatura
                referenceId:
                  type: string
                  maxLength: 100
                  description: >
                    Public code del recurso referenciado.
                    **Requerido para `site`** (ej: `SIT-XXXXX-1`) y **`channel`** (ej: `CHN-XXXXX-1`).
                    No aplica para `folder`.
                  example: CHN-5LYJX-4
                icon:
                  type: string
                  maxLength: 50
                  description: >
                    Nombre del ícono. Opcional para todos los tipos.
                    Si no se envía, se auto-asigna: folder → 'folder', site → 'building', channel → 'activity'.
                    Para `site`/`channel`, también se auto-enriquece desde el recurso referenciado.
                  example: folder
                displayOrder:
                  type: integer
                  minimum: 0
                  description: Orden de visualización entre hermanos (0 = primero). Los nodos se ordenan por displayOrder ASC, luego por nombre ASC.
                  default: 0
                  example: 0
                metadata:
                  type: object
                  description: Metadatos adicionales en formato JSON (sin restricción de estructura)
                  example: { "zona": "norte", "prioridad": "alta" }
            examples:
              crear_folder:
                summary: Crear una carpeta (name requerido)
                value:
                  nodeType: folder
                  name: Sensores de Temperatura
                  description: Carpeta para agrupar sensores de temperatura
                  parentId: RES-def456ghi-2
                  icon: folder
                  displayOrder: 0
              crear_site_con_nombre:
                summary: Crear site con nombre explícito
                value:
                  nodeType: site
                  name: Planta Norte
                  description: Site de la planta norte
                  parentId: RES-def456ghi-2
                  referenceId: SIT-ABCDE-1
                  icon: building
                  displayOrder: 1
              crear_site_auto_enriquecido:
                summary: Crear site sin nombre (auto-enriquece desde el site referenciado)
                value:
                  nodeType: site
                  parentId: RES-def456ghi-2
                  referenceId: SIT-ABCDE-1
              crear_channel_con_nombre:
                summary: Crear channel con nombre y metadata
                value:
                  nodeType: channel
                  name: Medidor de Energía Principal
                  description: Canal de medición de energía
                  parentId: RES-def456ghi-2
                  referenceId: CHN-5LYJX-4
                  icon: activity
                  displayOrder: 0
                  metadata:
                    unidad: kWh
                    categoria: energia
              crear_channel_auto_enriquecido:
                summary: Crear channel sin nombre ni ícono (auto-enriquece desde el channel referenciado)
                value:
                  nodeType: channel
                  parentId: RES-def456ghi-2
                  referenceId: CHN-5LYJX-4
      responses:
        "201":
          description: Nodo creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ResourceNode"
              examples:
                response_folder:
                  summary: Respuesta al crear folder
                  value:
                    ok: true
                    data:
                      id: RES-new001abc-3
                      name: Sensores de Temperatura
                      description: Carpeta para agrupar sensores de temperatura
                      nodeType: folder
                      referenceId: null
                      icon: folder
                      displayOrder: 0
                      depth: 1
                      parentId: RES-def456ghi-2
                      hasChildren: false
                      childrenCount: 0
                      metadata: {}
                      isActive: true
                      createdAt: "2026-03-20T10:00:00.000Z"
                      updatedAt: "2026-03-20T10:00:00.000Z"
                response_site:
                  summary: Respuesta al crear site (auto-enriquecido)
                  value:
                    ok: true
                    data:
                      id: RES-new002def-3
                      name: Planta Norte
                      description: null
                      nodeType: site
                      referenceId: SIT-ABCDE-1
                      icon: building
                      displayOrder: 1
                      depth: 1
                      parentId: RES-def456ghi-2
                      hasChildren: false
                      childrenCount: 0
                      metadata: {}
                      isActive: true
                      createdAt: "2026-03-20T10:00:00.000Z"
                      updatedAt: "2026-03-20T10:00:00.000Z"
                response_channel:
                  summary: Respuesta al crear channel con metadata
                  value:
                    ok: true
                    data:
                      id: RES-new003ghi-4
                      name: Medidor de Energía Principal
                      description: Canal de medición de energía
                      nodeType: channel
                      referenceId: CHN-5LYJX-4
                      icon: activity
                      displayOrder: 0
                      depth: 2
                      parentId: RES-def456ghi-2
                      hasChildren: false
                      childrenCount: 0
                      metadata: { unidad: kWh, categoria: energia }
                      isActive: true
                      createdAt: "2026-03-20T10:00:00.000Z"
                      updatedAt: "2026-03-20T10:00:00.000Z"
        "400":
          description: Error de validación del request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validacion_general:
                  summary: Campo requerido faltante
                  value:
                    ok: false
                    error:
                      code: VALIDATION_ERROR
                      message: nodeType es requerido
                padre_org_diferente:
                  summary: El nodo padre pertenece a otra organización
                  value:
                    ok: false
                    error:
                      code: PARENT_ORG_MISMATCH
                      message: El nodo padre debe pertenecer a la misma organización
        "401":
          description: No autenticado
        "403":
          description: Sin permisos suficientes (requiere rol org-admin, org-manager o system-admin)
        "404":
          description: Organización, nodo padre o recurso referenciado no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                padre_no_encontrado:
                  summary: Nodo padre no encontrado
                  value:
                    ok: false
                    error:
                      code: PARENT_NODE_NOT_FOUND
                      message: Nodo padre no encontrado
                org_no_encontrada:
                  summary: Organización no encontrada
                  value:
                    ok: false
                    error:
                      code: ORGANIZATION_NOT_FOUND
                      message: Organización no encontrada
                referencia_no_encontrada:
                  summary: El recurso referenciado (site/channel) no existe o no pertenece a la org
                  value:
                    ok: false
                    error:
                      code: REFERENCE_NOT_FOUND
                      message: "Canal no encontrado o no pertenece a esta organización: CHN-5LYJX-4"
        "409":
          description: El recurso referenciado ya existe en la jerarquía de la organización
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: REFERENCE_ALREADY_IN_HIERARCHY
                  message: "Este recurso (CHN-5LYJX-4) ya existe en la jerarquía de la organización"
    get:
      summary: Listar nodos de una organización
      description: >
        Obtiene lista paginada de nodos con filtros opcionales por tipo, padre, búsqueda y estado.

        Soporta paginación por `limit`/`offset` o por `page`.

        Incluye por defecto el conteo de hijos directos de cada nodo (`childrenCount`).
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: organizationId
          required: false
          schema:
            type: string
          description: Public code de la organización (opcional, usa la org activa del usuario si no se especifica)
        - in: query
          name: parentId
          schema:
            type: string
          description: Filtrar por nodo padre (usar 'root' para nodos raíz)
        - in: query
          name: nodeType
          schema:
            type: string
            enum:
              - folder
              - site
              - channel
          description: Filtrar por tipo de nodo
        - in: query
          name: search
          schema:
            type: string
            maxLength: 100
          description: Buscar por nombre o descripción (búsqueda parcial, case-insensitive)
        - in: query
          name: isActive
          schema:
            type: boolean
          description: Filtrar por estado activo/inactivo
        - in: query
          name: includeCounts
          schema:
            type: boolean
            default: true
          description: Incluir conteo de hijos directos en cada nodo
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
          description: Límite de resultados por página
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Offset para paginación
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: Número de página (alternativa a offset; se convierte a offset automáticamente)
      responses:
        "200":
          description: Lista de nodos paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResourceNode"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
  "/api/v1/resource-hierarchy/nodes/{id}":
    get:
      summary: Obtener un nodo por ID
      description: Obtiene los detalles completos de un nodo específico por su public code.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo (ej. RES-abc123xyz-1)
          example: RES-abc123xyz-1
      responses:
        "200":
          description: Nodo encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ResourceNode"
        "401":
          description: No autenticado
        "404":
          description: Nodo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo no encontrado
    put:
      summary: Actualizar un nodo
      description: >
        Actualiza los campos editables de un nodo.

        **Campos editables (todos los tipos de nodo):**

        | Campo | Descripción |
        |---|---|
        | `name` | Nombre visible del nodo (1-255 caracteres) |
        | `description` | Descripción opcional (hasta 2000 caracteres) |
        | `icon` | Nombre del ícono (hasta 50 caracteres) |
        | `displayOrder` | Orden de visualización entre nodos hermanos (entero ≥ 0) |
        | `metadata` | Objeto JSON libre con metadatos adicionales |
        | `isActive` | Activar/desactivar el nodo (soft disable) |


        **Campos NO editables vía este endpoint:**

        - `nodeType` — inmutable tras la creación.

        - `referenceId` — inmutable tras la creación.

        - `parentId` — usar `PATCH /nodes/:id/move` para cambiar el padre.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo
          example: RES-abc123xyz-1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Nuevo nombre del nodo
                  example: Nuevo Nombre de Carpeta
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                  description: Nueva descripción del nodo
                  example: Descripción actualizada
                icon:
                  type: string
                  maxLength: 50
                  description: Nuevo nombre del ícono
                  example: building
                displayOrder:
                  type: integer
                  minimum: 0
                  description: Nuevo orden de visualización entre hermanos
                  example: 2
                metadata:
                  type: object
                  description: Nuevos metadatos (reemplaza el objeto completo)
                  example: { "zona": "sur", "prioridad": "media" }
                isActive:
                  type: boolean
                  description: Activar (true) o desactivar (false) el nodo
                  example: true
            examples:
              actualizar_nombre:
                summary: Renombrar el nodo
                value:
                  name: Sensores de Humedad
              actualizar_orden:
                summary: Cambiar posición entre hermanos
                value:
                  displayOrder: 3
              desactivar_nodo:
                summary: Desactivar un nodo
                value:
                  isActive: false
      responses:
        "200":
          description: Nodo actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ResourceNode"
        "400":
          description: Error de validación del request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: VALIDATION_ERROR
                  message: name no puede exceder 255 caracteres
        "401":
          description: No autenticado
        "403":
          description: Sin permisos suficientes (requiere org-admin, org-manager o system-admin)
        "404":
          description: Nodo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo no encontrado
    delete:
      summary: Eliminar un nodo
      description: >
        Elimina un nodo (soft delete — marca `isActive = false` y `deletedAt` en la DB).


        **Comportamiento según `cascade`:**

        - `cascade=false` (por defecto): Si el nodo tiene hijos directos o descendientes activos, **no lo elimina** y retorna 409 `HAS_CHILDREN` con la lista de nodos afectados. Esto permite al frontend mostrar una confirmación al usuario.

        - `cascade=true`: Elimina el nodo **y todos sus descendientes** de forma recursiva. La respuesta incluye todos los nodos eliminados con su información básica.


        **Flujo recomendado en el frontend:**

        1. Llamar `DELETE /nodes/:id` sin `cascade`.

        2. Si la respuesta es 409 (`HAS_CHILDREN`), mostrar al usuario los nodos afectados del campo `data.affectedNodes`.

        3. Si el usuario confirma, reintentar con `cascade=true`.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo a eliminar
          example: RES-abc123xyz-1
        - in: query
          name: cascade
          schema:
            type: boolean
            default: false
          description: >
            Si `true`, elimina el nodo y todos sus descendientes en cascada.
            Si `false` (por defecto) y el nodo tiene hijos, retorna 409 con la lista de nodos afectados.
      responses:
        "200":
          description: Nodo(s) eliminado(s) exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      deletedCount:
                        type: integer
                        description: Cantidad total de nodos eliminados
                        example: 5
                      deletedNodes:
                        type: array
                        description: Lista de todos los nodos eliminados con información básica
                        items:
                          type: object
                          properties:
                            publicCode:
                              type: string
                              example: RES-abc123-1
                            name:
                              type: string
                              example: Sensor de Temperatura
                            nodeType:
                              type: string
                              enum:
                                - folder
                                - site
                                - channel
                      cascade:
                        type: boolean
                        description: Indica si se usó eliminación en cascada
              examples:
                sin_cascade:
                  summary: Eliminación sin cascade (nodo hoja)
                  value:
                    ok: true
                    data:
                      deletedCount: 1
                      deletedNodes:
                        - publicCode: RES-abc123-1
                          name: Sensor de Temperatura
                          nodeType: channel
                      cascade: false
                con_cascade:
                  summary: Eliminación con cascade (árbol completo)
                  value:
                    ok: true
                    data:
                      deletedCount: 5
                      deletedNodes:
                        - publicCode: RES-abc123-1
                          name: Carpeta Principal
                          nodeType: folder
                        - publicCode: RES-def456-2
                          name: Planta Norte
                          nodeType: site
                        - publicCode: RES-ghi789-3
                          name: Medidor A
                          nodeType: channel
                        - publicCode: RES-jkl012-4
                          name: Medidor B
                          nodeType: channel
                        - publicCode: RES-mno345-5
                          name: Medidor C
                          nodeType: channel
                      cascade: true
        "401":
          description: No autenticado
        "403":
          description: Sin permisos suficientes (requiere org-admin o system-admin)
        "404":
          description: Nodo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo no encontrado
        "409":
          description: El nodo tiene hijos activos y no se confirmó cascade
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: HAS_CHILDREN
                      message:
                        type: string
                        example: El nodo tiene hijos. Debe confirmar la eliminación en cascada.
                  data:
                    type: object
                    properties:
                      affectedNodes:
                        type: array
                        description: Lista de todos los nodos que serían eliminados
                        items:
                          type: object
                          properties:
                            publicCode:
                              type: string
                              example: RES-def456-2
                            name:
                              type: string
                              example: Planta Norte
                            nodeType:
                              type: string
                              enum:
                                - folder
                                - site
                                - channel
                      totalAffected:
                        type: integer
                        description: Total de nodos que serían eliminados (incluye el nodo raíz)
                        example: 4
              example:
                ok: false
                error:
                  code: HAS_CHILDREN
                  message: El nodo tiene hijos. Debe confirmar la eliminación en cascada.
                data:
                  affectedNodes:
                    - publicCode: RES-def456-2
                      name: Planta Norte
                      nodeType: site
                    - publicCode: RES-ghi789-3
                      name: Medidor A
                      nodeType: channel
                  totalAffected: 3
  /api/v1/resource-hierarchy/nodes/batch:
    post:
      summary: Obtener múltiples nodos por IDs
      description: >
        Obtiene los detalles de múltiples nodos en una sola llamada.

        Útil para cargar breadcrumbs, selecciones múltiples o resolver referencias en paralelo.


        **Seguridad multi-tenant:** Solo retorna nodos que pertenezcan a la organización activa del usuario.
        Nodos de otras organizaciones son filtrados automáticamente (no retorna error, simplemente no los incluye).


        **Límite:** Máximo 100 IDs por request.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
                  description: Array de public codes de nodos (máximo 100)
                  example:
                    - RES-abc123-1
                    - RES-def456-2
                    - RES-ghi789-3
                includeCounts:
                  type: boolean
                  default: true
                  description: Incluir conteo de hijos directos en cada nodo
            example:
              ids:
                - RES-abc123-1
                - RES-def456-2
              includeCounts: true
      responses:
        "200":
          description: Lista de nodos encontrados (filtrados por organización activa)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResourceNode"
                  meta:
                    type: object
                    properties:
                      requested:
                        type: integer
                        description: Cantidad de IDs solicitados
                        example: 3
                      found:
                        type: integer
                        description: Cantidad de nodos encontrados y retornados
                        example: 2
              example:
                ok: true
                data:
                  - id: RES-abc123-1
                    name: Carpeta Principal
                    nodeType: folder
                    referenceId: null
                    icon: folder
                    displayOrder: 0
                    depth: 0
                    parentId: null
                    hasChildren: true
                    childrenCount: 3
                    isActive: true
                    createdAt: "2026-01-01T00:00:00.000Z"
                    updatedAt: "2026-01-01T00:00:00.000Z"
                  - id: RES-def456-2
                    name: Planta Norte
                    nodeType: site
                    referenceId: SIT-ABCDE-1
                    icon: building
                    displayOrder: 1
                    depth: 1
                    parentId: RES-abc123-1
                    hasChildren: false
                    childrenCount: 0
                    isActive: true
                    createdAt: "2026-01-02T00:00:00.000Z"
                    updatedAt: "2026-01-02T00:00:00.000Z"
                meta:
                  requested: 3
                  found: 2
        "400":
          description: Error de validación (ej. se superó el límite de 100 IDs)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: VALIDATION_ERROR
                  message: No puede solicitar más de 100 nodos a la vez
        "401":
          description: No autenticado
  /api/v1/resource-hierarchy/nodes/batch-create:
    post:
      summary: Crear múltiples nodos en lote
      description: >
        Crea múltiples nodos bajo el mismo padre y organización.

        Soporta **éxito parcial**: si algunos nodos fallan (ej. duplicados), los demás se insertan correctamente.


        **Comportamiento de éxito parcial:**

        - Si algunos nodos fallan y otros tienen éxito → retorna HTTP 200 con arrays `inserted` y `failed`.

        - Si todos los nodos tienen éxito → retorna HTTP 201.

        - Si **todos** los nodos fallan → retorna HTTP 409 con código `ALL_NODES_FAILED`.


        **Códigos de fallo por nodo individual:**

        | Código | Descripción |
        |---|---|
        | `DUPLICATE_IN_BATCH` | El mismo `referenceId` aparece más de una vez en el batch |
        | `ALREADY_IN_HIERARCHY` | El recurso (site/channel) ya existe en la jerarquía de la organización |
        | `INVALID_NODE_TYPE` | Tipo de nodo no permitido |
        | `UNKNOWN_ERROR` | Error inesperado al insertar el nodo |


        **Límite:** Máximo 50 nodos por request.


        **Audit:** Se registra un audit log por cada nodo insertado exitosamente.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nodes
              properties:
                parentId:
                  type: string
                  nullable: true
                  description: Public code del nodo padre para todos los nodos del batch (null para crear como nodos raíz)
                  example: RES-abc123xyz-1
                nodes:
                  type: array
                  minItems: 1
                  maxItems: 50
                  description: Array de nodos a crear (todos bajo el mismo padre)
                  items:
                    type: object
                    required:
                      - nodeType
                    description: >
                      Usa discriminated union por `nodeType` (igual que POST /nodes):
                      - `folder`: `name` es **requerido**, `referenceId` no aplica.
                      - `site`: `referenceId` es **requerido**, `name` es **opcional** (auto-enriquecido).
                      - `channel`: `referenceId` es **requerido**, `name` es **opcional** (auto-enriquecido).
                    properties:
                      nodeType:
                        type: string
                        enum:
                          - folder
                          - site
                          - channel
                        description: Tipo de nodo (discriminante)
                      name:
                        type: string
                        minLength: 1
                        maxLength: 255
                        description: >
                          Nombre del nodo. **Requerido para `folder`**.
                          Opcional para `site`/`channel` (auto-enriquecido desde el recurso referenciado).
                        example: Medidor Principal
                      description:
                        type: string
                        nullable: true
                        maxLength: 2000
                        description: Descripción del nodo (opcional para todos los tipos)
                      referenceId:
                        type: string
                        maxLength: 100
                        description: >
                          Public code del recurso referenciado.
                          **Requerido para `site`** (ej: `SIT-xxx`) y **`channel`** (ej: `CHN-xxx`).
                          No aplica para `folder`.
                        example: CHN-5LYJX-4
                      icon:
                        type: string
                        nullable: true
                        maxLength: 50
                        description: Nombre del ícono (opcional, auto-asignado si no se envía)
                      displayOrder:
                        type: integer
                        minimum: 0
                        description: Orden de visualización (auto-asignado si no se especifica)
                        default: 0
                      metadata:
                        type: object
                        description: Metadatos adicionales (opcional para todos los tipos)
            example:
              parentId: RES-abc123xyz-1
              nodes:
                - nodeType: channel
                  name: Medidor de Energía A
                  referenceId: CHN-AAA01-1
                  icon: activity
                  displayOrder: 0
                - nodeType: channel
                  name: Medidor de Energía B
                  referenceId: CHN-BBB02-1
                  icon: activity
                  displayOrder: 1
                - nodeType: channel
                  name: Medidor Duplicado
                  referenceId: CHN-AAA01-1
                  icon: activity
                  displayOrder: 2
      responses:
        "201":
          description: Todos los nodos creados exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateNodesResponse"
              example:
                ok: true
                data:
                  inserted:
                    - publicCode: RES-new001-1
                      referenceId: CHN-AAA01-1
                      nodeType: channel
                      name: Medidor de Energía A
                    - publicCode: RES-new002-1
                      referenceId: CHN-BBB02-1
                      nodeType: channel
                      name: Medidor de Energía B
                  failed: []
                  meta:
                    requested: 2
                    inserted: 2
                    failed: 0
        "200":
          description: Éxito parcial — algunos nodos insertados, otros fallaron
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateNodesResponse"
              example:
                ok: true
                data:
                  inserted:
                    - publicCode: RES-new001-1
                      referenceId: CHN-AAA01-1
                      nodeType: channel
                      name: Medidor de Energía A
                    - publicCode: RES-new002-1
                      referenceId: CHN-BBB02-1
                      nodeType: channel
                      name: Medidor de Energía B
                  failed:
                    - referenceId: CHN-AAA01-1
                      name: Medidor Duplicado
                      reasonCode: DUPLICATE_IN_BATCH
                      message: Este recurso está duplicado dentro del mismo batch
                  meta:
                    requested: 3
                    inserted: 2
                    failed: 1
        "401":
          description: No autenticado
        "403":
          description: Sin permisos suficientes (requiere org-admin, org-manager o system-admin)
        "400":
          description: Error de validación o padre de otra organización
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validacion:
                  summary: Error de validación del request
                  value:
                    ok: false
                    error:
                      code: VALIDATION_ERROR
                      message: No puede crear más de 50 nodos a la vez
                padre_org_diferente:
                  summary: El nodo padre pertenece a otra organización
                  value:
                    ok: false
                    error:
                      code: PARENT_ORG_MISMATCH
                      message: El nodo padre debe pertenecer a la misma organización
        "404":
          description: Nodo padre no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: PARENT_NODE_NOT_FOUND
                  message: Nodo padre no encontrado
        "409":
          description: Todos los nodos fallaron (ninguno fue insertado)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: ALL_NODES_FAILED
                      message:
                        type: string
                        example: Todos los nodos fallaron al insertarse
                  data:
                    $ref: "#/components/schemas/BatchCreateNodesResult"
              example:
                ok: false
                error:
                  code: ALL_NODES_FAILED
                  message: Todos los nodos fallaron al insertarse
                data:
                  inserted: []
                  failed:
                    - referenceId: CHN-AAA01-1
                      name: Medidor de Energía A
                      reasonCode: ALREADY_IN_HIERARCHY
                      message: Este recurso ya existe en la jerarquía
                    - referenceId: CHN-AAA01-1
                      name: Medidor Duplicado
                      reasonCode: DUPLICATE_IN_BATCH
                      message: Este recurso está duplicado dentro del mismo batch
                  meta:
                    requested: 2
                    inserted: 0
                    failed: 2
  "/api/v1/resource-hierarchy/nodes/{id}/move":
    patch:
      summary: Mover un nodo a un nuevo padre y/o cambiar su orden
      description: >
        Mueve un nodo **y todos sus descendientes** a una nueva ubicación en la jerarquía.

        Opcionalmente permite cambiar el `displayOrder` en la misma operación.


        **Comportamiento:**

        - Mover un nodo mueve automáticamente todo su subárbol completo (hijos, nietos, etc.).

        - El `displayOrder` controla la posición relativa entre nodos hermanos en el destino (0 = primero).

        - Es posible cambiar solo el `displayOrder` sin cambiar de padre (pasando el mismo padre en `newParentId`).


        **Validaciones:**

        - El nodo y nuevo padre deben existir.

        - Deben pertenecer a la misma organización (no se permiten movimientos entre orgs).

        - No se puede mover un nodo a uno de sus propios descendientes (`CYCLE_DETECTED`).

        - No se puede mover un nodo a sí mismo (`SELF_REFERENCE`).

        - El usuario debe tener permisos `edit` tanto en el nodo origen como en el nodo destino (excepto org-admin y system-admin).
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo a mover
          example: RES-abc123xyz-1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newParentId
              properties:
                newParentId:
                  type: string
                  nullable: true
                  description: >
                    Public code del nuevo nodo padre (formato `RES-XXX-XXX`). Debe ser el public code
                    del nodo destino, **no** su UUID interno. Usar `null` para mover el nodo a nivel raíz.
                  example: RES-newparent-2
                displayOrder:
                  type: integer
                  minimum: 0
                  description: Nuevo orden de visualización entre los nodos hermanos en el destino (opcional)
                  example: 2
            examples:
              mover_a_otro_padre:
                summary: Mover nodo a otro padre
                value:
                  newParentId: RES-newparent-2
                  displayOrder: 0
              mover_a_raiz:
                summary: Mover nodo a nivel raíz
                value:
                  newParentId: null
              solo_reordenar:
                summary: Cambiar orden sin cambiar padre
                value:
                  newParentId: RES-currentparent-1
                  displayOrder: 3
      responses:
        "200":
          description: Nodo movido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ResourceNode"
        "400":
          description: Movimiento inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                ciclo_detectado:
                  summary: Intentando mover a un descendiente (ciclo)
                  value:
                    ok: false
                    error:
                      code: CYCLE_DETECTED
                      message: No se puede mover un nodo a uno de sus descendientes
                auto_referencia:
                  summary: Intentando mover el nodo a sí mismo
                  value:
                    ok: false
                    error:
                      code: SELF_REFERENCE
                      message: No se puede mover un nodo a sí mismo
                org_diferente:
                  summary: Intentando mover a otra organización
                  value:
                    ok: false
                    error:
                      code: CROSS_ORG_MOVE_NOT_ALLOWED
                      message: No se puede mover a una organización diferente
        "401":
          description: No autenticado
        "403":
          description: Permisos insuficientes sobre el nodo origen o destino
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sin_permiso_origen:
                  value:
                    ok: false
                    error:
                      code: INSUFFICIENT_SOURCE_PERMISSIONS
                      message: No tiene permisos para mover este nodo
                sin_permiso_destino:
                  value:
                    ok: false
                    error:
                      code: INSUFFICIENT_DESTINATION_PERMISSIONS
                      message: No tiene permisos sobre el nodo destino
        "404":
          description: Nodo o nuevo padre no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                nodo_no_encontrado:
                  value:
                    ok: false
                    error:
                      code: NODE_NOT_FOUND
                      message: Nodo no encontrado
                nuevo_padre_no_encontrado:
                  value:
                    ok: false
                    error:
                      code: NEW_PARENT_NOT_FOUND
                      message: Nuevo nodo padre no encontrado
  "/api/v1/resource-hierarchy/nodes/{id}/children":
    get:
      summary: Obtener hijos directos de un nodo
      description: >
        Obtiene los nodos hijos inmediatos de un nodo específico (un solo nivel de profundidad).

        Los nodos se ordenan por `displayOrder` ASC, luego por nombre ASC.

        Para obtener los nodos de nivel raíz, usar `GET /roots` o pasar `id = root`.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo padre. Usar el literal `root` para obtener nodos raíz.
          example: RES-abc123xyz-1
        - in: query
          name: nodeType
          schema:
            type: string
            enum:
              - folder
              - site
              - channel
          description: Filtrar hijos por tipo de nodo
        - in: query
          name: includeCounts
          schema:
            type: boolean
            default: true
          description: Incluir el campo `childrenCount` en cada nodo retornado
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
          description: Límite de resultados
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Offset para paginación
      responses:
        "200":
          description: Lista de hijos directos del nodo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResourceNode"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
              example:
                ok: true
                data:
                  - id: RES-child001-1
                    name: Carpeta Interna
                    nodeType: folder
                    referenceId: null
                    icon: folder
                    displayOrder: 0
                    depth: 1
                    parentId: RES-abc123xyz-1
                    hasChildren: true
                    childrenCount: 5
                    isActive: true
                    createdAt: "2026-01-01T00:00:00.000Z"
                    updatedAt: "2026-01-01T00:00:00.000Z"
                  - id: RES-child002-1
                    name: Medidor Principal
                    nodeType: channel
                    referenceId: CHN-5LYJX-4
                    icon: activity
                    displayOrder: 1
                    depth: 1
                    parentId: RES-abc123xyz-1
                    hasChildren: false
                    childrenCount: 0
                    isActive: true
                    createdAt: "2026-01-02T00:00:00.000Z"
                    updatedAt: "2026-01-02T00:00:00.000Z"
                meta:
                  total: 2
                  limit: 100
                  offset: 0
        "401":
          description: No autenticado
        "404":
          description: Nodo padre no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo padre no encontrado
  "/api/v1/resource-hierarchy/nodes/{id}/descendants":
    get:
      summary: Obtener todos los descendientes de un nodo
      description: >
        Obtiene **todos** los nodos descendientes (hijos, nietos, bisnietos, etc.) de un nodo dado.

        Usa consultas ltree para eficiencia incluso en árboles grandes.

        Los resultados se retornan como una lista plana (no como árbol anidado). Usar `GET /tree` para estructura anidada.


        **Parámetro `maxDepth`:**

        Limita la profundidad relativa de la búsqueda. Por ejemplo, `maxDepth=1` retorna solo los hijos directos,
        `maxDepth=2` hijos y nietos, etc. Si no se especifica, retorna todos los descendientes.


        Los resultados se ordenan por profundidad ASC y luego por `displayOrder` ASC.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo ancestro
          example: RES-abc123xyz-1
        - in: query
          name: nodeType
          schema:
            type: string
            enum:
              - folder
              - site
              - channel
          description: Filtrar descendientes por tipo de nodo
        - in: query
          name: maxDepth
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: Profundidad máxima relativa al nodo raíz (1 = solo hijos directos, 2 = hijos y nietos, etc.)
        - in: query
          name: limit
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 500
          description: Límite de resultados
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Offset para paginación
      responses:
        "200":
          description: Lista plana de todos los descendientes del nodo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResourceNode"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
              example:
                ok: true
                data:
                  - id: RES-child001-1
                    name: Carpeta Interna
                    nodeType: folder
                    referenceId: null
                    depth: 1
                    parentId: RES-abc123xyz-1
                    hasChildren: true
                    isActive: true
                  - id: RES-grandchild001-1
                    name: Medidor A
                    nodeType: channel
                    referenceId: CHN-AAA01-1
                    depth: 2
                    parentId: RES-child001-1
                    hasChildren: false
                    isActive: true
                meta:
                  total: 2
                  limit: 500
                  offset: 0
        "401":
          description: No autenticado
        "404":
          description: Nodo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo no encontrado
  "/api/v1/resource-hierarchy/nodes/{id}/ancestors":
    get:
      summary: Obtener ancestros de un nodo (breadcrumb)
      description: >
        Obtiene la cadena completa de ancestros desde la raíz hasta el padre directo del nodo.

        Útil para construir breadcrumbs de navegación.

        La lista está ordenada desde el nodo raíz (depth=0) hasta el padre inmediato del nodo consultado.

        El nodo consultado en sí **no** se incluye en la respuesta.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo del que se desean obtener los ancestros
          example: RES-abc123xyz-1
      responses:
        "200":
          description: Lista de ancestros ordenada desde raíz hasta padre directo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    description: Lista de ancestros ordenada desde el nodo raíz (depth=0) hasta el padre directo. Vacía si el nodo es raíz.
                    items:
                      $ref: "#/components/schemas/ResourceNode"
              example:
                ok: true
                data:
                  - id: RES-root001-1
                    name: Organización Principal
                    nodeType: folder
                    referenceId: null
                    depth: 0
                    parentId: null
                    hasChildren: true
                    isActive: true
                  - id: RES-mid001-1
                    name: Zona Norte
                    nodeType: folder
                    referenceId: null
                    depth: 1
                    parentId: RES-root001-1
                    hasChildren: true
                    isActive: true
        "401":
          description: No autenticado
        "404":
          description: Nodo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo no encontrado
  /api/v1/resource-hierarchy/tree:
    get:
      summary: Obtener árbol completo de una organización
      description: >
        Obtiene la estructura de árbol completa de una organización, o un subárbol a partir de un nodo específico.

        Los nodos se retornan en formato anidado con el campo `children` conteniendo sus hijos.

        Los nodos se ordenan por `displayOrder` ASC, luego por nombre ASC en cada nivel.


        **Parámetro `maxDepth`:**

        Limita la profundidad máxima del árbol retornado. Por ejemplo, `maxDepth=2` retorna solo los primeros 2 niveles.
        Si no se especifica, retorna el árbol completo sin límite de profundidad.


        **Parámetro `rootId`:**

        Si se especifica, retorna el subárbol a partir de ese nodo (el nodo especificado se convierte en la raíz del resultado).
        Si no se especifica, retorna el árbol completo de la organización desde los nodos raíz.


        **Nota de rendimiento:** Para organizaciones con árboles muy grandes, usar `maxDepth` limita la cantidad de datos retornados.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: organizationId
          required: false
          schema:
            type: string
          description: Public code de la organización (opcional, usa la org activa del usuario)
        - in: query
          name: rootId
          schema:
            type: string
          description: Public code del nodo raíz para retornar solo su subárbol
          example: RES-abc123xyz-1
        - in: query
          name: maxDepth
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: Profundidad máxima del árbol a retornar (sin límite si no se especifica)
          example: 3
        - in: query
          name: includeCounts
          schema:
            type: boolean
            default: true
          description: Incluir el campo `childrenCount` en cada nodo
      responses:
        "200":
          description: Árbol estructurado de la organización
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    description: Array de nodos raíz, cada uno con su subárbol anidado en `children`
                    items:
                      $ref: "#/components/schemas/ResourceNodeWithChildren"
              example:
                ok: true
                data:
                  - id: RES-root001-1
                    name: Organización Principal
                    nodeType: folder
                    referenceId: null
                    depth: 0
                    parentId: null
                    hasChildren: true
                    childrenCount: 2
                    isActive: true
                    children:
                      - id: RES-mid001-1
                        name: Zona Norte
                        nodeType: folder
                        referenceId: null
                        depth: 1
                        parentId: RES-root001-1
                        hasChildren: true
                        childrenCount: 1
                        isActive: true
                        children:
                          - id: RES-leaf001-1
                            name: Medidor A
                            nodeType: channel
                            referenceId: CHN-AAA01-1
                            depth: 2
                            parentId: RES-mid001-1
                            hasChildren: false
                            childrenCount: 0
                            isActive: true
                            children: []
                      - id: RES-mid002-1
                        name: Zona Sur
                        nodeType: folder
                        referenceId: null
                        depth: 1
                        parentId: RES-root001-1
                        hasChildren: false
                        childrenCount: 0
                        isActive: true
                        children: []
        "401":
          description: No autenticado
        "404":
          description: Nodo raíz (`rootId`) no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo raíz no encontrado
  /api/v1/resource-hierarchy/tree/filter:
    get:
      summary: Obtener árbol filtrado por categoría de asset
      description: >
        Retorna solo las ramas del árbol que contienen nodos con la categoría de asset especificada.

        Los nodos padres (carpetas, sites) se incluyen para mantener la estructura del árbol,
        pero solo aquellos que tienen al menos un descendiente que coincide con el filtro.

        Cada nodo del resultado incluye el campo `matchesFilter: true` si el nodo mismo coincide
        directamente con el filtro (por oposición a nodos que se incluyen solo por contener descendientes que coinciden).


        **Parámetro `includeSubcategories`:**

        Si es `true` (por defecto), incluye también canales con subcategorías de la categoría especificada.
        Si es `false`, solo incluye canales con la categoría exacta.


        **Uso típico:** Mostrar al usuario solo los canales de tipo "Aire Acondicionado" dentro del árbol completo,
        manteniendo la estructura jerárquica para contexto visual.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: organizationId
          schema:
            type: string
          description: Public code de la organización (opcional, usa la org activa)
        - in: query
          name: categoryId
          required: true
          schema:
            type: integer
          description: ID de la categoría de asset a filtrar (asset_category.id)
          example: 42
        - in: query
          name: includeSubcategories
          schema:
            type: boolean
            default: true
          description: Si `true`, incluye también subcategorías de la categoría especificada
      responses:
        "200":
          description: Árbol filtrado mostrando solo ramas con la categoría especificada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResourceNodeWithChildren"
              example:
                ok: true
                data:
                  - id: RES-root001-1
                    name: Organización Principal
                    nodeType: folder
                    depth: 0
                    matchesFilter: false
                    children:
                      - id: RES-mid001-1
                        name: Zona Norte
                        nodeType: folder
                        depth: 1
                        matchesFilter: false
                        children:
                          - id: RES-leaf001-1
                            name: Medidor Aire Acondicionado
                            nodeType: channel
                            referenceId: CHN-AAA01-1
                            depth: 2
                            matchesFilter: true
                            children: []
        "400":
          description: Parámetro `categoryId` faltante o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: VALIDATION_ERROR
                  message: categoryId debe ser un entero positivo
        "401":
          description: No autenticado
  "/api/v1/resource-hierarchy/nodes/{id}/has-category-descendants":
    get:
      summary: Verificar si un nodo tiene descendientes con cierta categoría
      description: >
        Verifica si un nodo tiene al menos un descendiente con la categoría de asset especificada.

        Útil para lazy loading en frontend: permite saber si al expandir un nodo habrá resultados
        con el filtro aplicado, sin necesidad de cargar todos los descendientes.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Public code del nodo a verificar
          example: RES-abc123xyz-1
        - in: query
          name: categoryId
          required: true
          schema:
            type: integer
          description: ID de la categoría de asset
          example: 42
        - in: query
          name: includeSubcategories
          schema:
            type: boolean
            default: true
          description: Si incluir subcategorías del tag en la búsqueda
      responses:
        "200":
          description: Resultado de la verificación
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  hasDescendants:
                    type: boolean
                    description: true si el nodo tiene al menos un descendiente con la categoría especificada
                    example: true
              example:
                ok: true
                hasDescendants: true
        "401":
          description: No autenticado
        "404":
          description: Nodo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                ok: false
                error:
                  code: NODE_NOT_FOUND
                  message: Nodo no encontrado
  /api/v1/resource-hierarchy/roots:
    get:
      summary: Obtener nodos raíz de una organización
      description: >
        Obtiene los nodos de nivel superior (sin padre) de una organización.

        Equivalente a llamar `GET /nodes/:id/children` con `id=root`.

        Los nodos se ordenan por `displayOrder` ASC, luego por nombre ASC.
      tags:
        - Resource Hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: organizationId
          required: false
          schema:
            type: string
          description: Public code de la organización (opcional, usa la org activa del usuario)
        - in: query
          name: nodeType
          schema:
            type: string
            enum:
              - folder
              - site
              - channel
          description: Filtrar por tipo de nodo
        - in: query
          name: includeCounts
          schema:
            type: boolean
            default: true
          description: Incluir el campo `childrenCount` en cada nodo
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
          description: Límite de resultados
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Offset para paginación
      responses:
        "200":
          description: Lista de nodos raíz de la organización
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResourceNode"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
              example:
                ok: true
                data:
                  - id: RES-root001-1
                    name: Organización Principal
                    nodeType: folder
                    referenceId: null
                    icon: folder
                    displayOrder: 0
                    depth: 0
                    parentId: null
                    hasChildren: true
                    childrenCount: 5
                    isActive: true
                    createdAt: "2026-01-01T00:00:00.000Z"
                    updatedAt: "2026-01-01T00:00:00.000Z"
                  - id: RES-root002-1
                    name: Planta Central
                    nodeType: site
                    referenceId: SIT-XYZ99-1
                    icon: building
                    displayOrder: 1
                    depth: 0
                    parentId: null
                    hasChildren: false
                    childrenCount: 0
                    isActive: true
                    createdAt: "2026-01-05T00:00:00.000Z"
                    updatedAt: "2026-01-05T00:00:00.000Z"
                meta:
                  total: 2
                  limit: 50
                  offset: 0
        "401":
          description: No autenticado
  /api/v1/resource-hierarchy/access:
    post:
      summary: Otorgar acceso a un usuario sobre un nodo
      description: Otorga permisos de acceso (view, edit, admin) a un usuario sobre un
        nodo y opcionalmente sus descendientes.
      tags:
        - Resource Hierarchy Access
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - nodeId
              properties:
                userId:
                  type: string
                  format: uuid
                  description: UUID del usuario
                nodeId:
                  type: string
                  description: Public code del nodo
                accessType:
                  type: string
                  enum:
                    - view
                    - edit
                    - admin
                  default: view
                includeDescendants:
                  type: boolean
                  default: true
                  description: Si el acceso aplica también a descendientes
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
                  description: Fecha de expiración del acceso
                notes:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Acceso otorgado
        "404":
          description: Nodo no encontrado
    delete:
      summary: Revocar acceso de un usuario sobre un nodo
      description: Revoca los permisos de acceso de un usuario sobre un nodo específico.
      tags:
        - Resource Hierarchy Access
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - nodeId
              properties:
                userId:
                  type: string
                  format: uuid
                nodeId:
                  type: string
      responses:
        "200":
          description: Acceso revocado
  /api/v1/resource-hierarchy/access/check:
    get:
      summary: Verificar acceso de un usuario a un nodo
      description: Verifica si un usuario tiene el nivel de acceso requerido sobre un
        nodo, considerando herencia de permisos.
      tags:
        - Resource Hierarchy Access
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: nodeId
          required: true
          schema:
            type: string
        - in: query
          name: accessType
          schema:
            type: string
            enum:
              - view
              - edit
              - admin
            default: view
      responses:
        "200":
          description: Resultado de verificación
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      hasAccess:
                        type: boolean
components:
  schemas:
    ResourceNode:
      type: object
      description: Nodo de la jerarquía de recursos
      properties:
        id:
          type: string
          description: Public code del nodo
          example: RES-abc123xyz-1
        name:
          type: string
          description: Nombre del nodo
          example: Sensores de Temperatura
        description:
          type: string
          nullable: true
          description: Descripción del nodo
          example: Carpeta para agrupar sensores de temperatura
        nodeType:
          type: string
          enum:
            - folder
            - site
            - channel
          description: Tipo de nodo
          example: channel
        referenceId:
          type: string
          nullable: true
          description: Public code del recurso referenciado (ej. CHN-xxx para channels, SIT-xxx para sites). Null para folders.
          example: CHN-5LYJX-4
        icon:
          type: string
          description: "Nombre del ícono. Valores por defecto: folder → 'folder', site → 'building', channel → 'activity'"
          example: activity
        displayOrder:
          type: integer
          description: Orden de visualización entre nodos hermanos (0 = primero). Los nodos se ordenan por displayOrder ASC, luego nombre ASC.
          example: 0
        depth:
          type: integer
          description: Profundidad del nodo en el árbol (0 = nodo raíz, 1 = hijo de raíz, etc.)
          example: 2
        parentId:
          type: string
          nullable: true
          description: >
            Public code del nodo padre (formato `RES-XXX-XXX`). Nunca expone UUIDs internos.
            Null si el nodo es raíz (no tiene padre).
          example: RES-def456ghi-2
        hasChildren:
          type: boolean
          description: Indica si el nodo tiene al menos un hijo activo
          example: false
        childrenCount:
          type: integer
          description: Cantidad de hijos directos activos. Solo incluido si `includeCounts=true` (por defecto).
          example: 0
        metadata:
          type: object
          description: Metadatos adicionales en formato JSON libre
          example: { "unidad": "kWh", "categoria": "energia" }
        isActive:
          type: boolean
          description: Estado del nodo (false indica soft delete)
          example: true
        createdAt:
          type: string
          format: date-time
          description: Fecha y hora de creación (ISO 8601)
          example: "2026-03-20T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          description: Fecha y hora de última actualización (ISO 8601)
          example: "2026-03-20T10:00:00.000Z"
    ResourceNodeWithChildren:
      allOf:
        - $ref: "#/components/schemas/ResourceNode"
        - type: object
          properties:
            children:
              type: array
              description: Hijos directos del nodo, cada uno recursivamente con su propio `children`
              items:
                $ref: "#/components/schemas/ResourceNodeWithChildren"
    PaginationMeta:
      type: object
      description: Metadatos de paginación
      properties:
        total:
          type: integer
          description: Total de elementos disponibles (sin aplicar paginación)
          example: 42
        limit:
          type: integer
          description: Límite aplicado en la consulta
          example: 50
        offset:
          type: integer
          description: Offset aplicado en la consulta
          example: 0
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Código de error interno
              example: NODE_NOT_FOUND
            message:
              type: string
              description: Descripción legible del error
              example: Nodo no encontrado
    BatchCreateNodeInserted:
      type: object
      description: Información básica de un nodo creado exitosamente en un batch
      properties:
        publicCode:
          type: string
          description: Public code del nodo recién creado
          example: RES-abc123xyz-1
        referenceId:
          type: string
          nullable: true
          description: Public code del recurso referenciado
          example: CHN-5LYJX-4
        nodeType:
          type: string
          enum:
            - folder
            - site
            - channel
          description: Tipo del nodo creado
          example: channel
        name:
          type: string
          description: Nombre del nodo creado
          example: Medidor Principal
    BatchCreateNodeFailed:
      type: object
      description: Información de un nodo que falló al insertarse en el batch
      properties:
        referenceId:
          type: string
          nullable: true
          description: Public code del recurso que se intentó insertar
          example: CHN-ABCDE-1
        name:
          type: string
          description: Nombre del nodo que se intentó crear
          example: Sensor de Humedad
        reasonCode:
          type: string
          description: Código del motivo del fallo
          enum:
            - DUPLICATE_IN_BATCH
            - ALREADY_IN_HIERARCHY
            - INVALID_NODE_TYPE
            - UNKNOWN_ERROR
          example: ALREADY_IN_HIERARCHY
        message:
          type: string
          description: Descripción legible del motivo del fallo
          example: Este recurso ya existe en la jerarquía
    BatchCreateNodesResult:
      type: object
      description: Resultado detallado de una operación batch-create
      properties:
        inserted:
          type: array
          description: Nodos insertados exitosamente
          items:
            $ref: "#/components/schemas/BatchCreateNodeInserted"
        failed:
          type: array
          description: Nodos que fallaron al insertarse con su motivo de fallo
          items:
            $ref: "#/components/schemas/BatchCreateNodeFailed"
        meta:
          type: object
          properties:
            requested:
              type: integer
              description: Total de nodos solicitados en el batch
              example: 5
            inserted:
              type: integer
              description: Cantidad de nodos insertados exitosamente
              example: 3
            failed:
              type: integer
              description: Cantidad de nodos que fallaron
              example: 2
    BatchCreateNodesResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/BatchCreateNodesResult"
